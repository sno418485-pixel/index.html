<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Groovy 会計</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Groovy会計">
<link rel="apple-touch-icon" href="icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d1b2e;--bg2:#152035;--bg3:#1c2d45;--bg4:#243550;
  --accent:#6cb4e4;--accent2:#4a9fd4;
  --green:#4cd46a;--green2:#3ab558;--purple:#7c3aed;
  --red:#e05252;--amber:#f59e0b;
  --text:#ffffff;--text2:#a0b4c8;--text3:#6080a0;
  --border:#2a3f5a;--radius:16px;--radius-sm:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  font-size:16px;overflow:hidden;}

/* ── App wrapper ── */
#app{position:fixed;inset:0;max-width:430px;margin:0 auto;overflow:hidden;}

/* ── Screens: only .active shows, covers full area ── */
.screen{
  position:absolute;inset:0;
  overflow-y:auto;
  padding:0 16px 40px;
  background:var(--bg);
  display:none;
  -webkit-overflow-scrolling:touch;
}
.screen.active{display:block;}
.screen::-webkit-scrollbar{display:none;}

/* ── Loading / Auth overlays ── */
#loading-overlay,#auth-overlay{
  position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#loading-overlay.hidden,#auth-overlay.hidden{display:none;}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:var(--text2);font-size:14px;}

/* ── Auth form ── */
.auth-card{background:var(--bg3);border-radius:var(--radius);padding:28px 24px;width:90%;max-width:360px;}
.auth-title{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px;}

/* ── Header ── */
.page-header{padding:20px 0 8px;position:sticky;top:0;background:var(--bg);z-index:10;}
.back-btn{color:var(--accent);font-size:15px;cursor:pointer;display:inline-flex;align-items:center;
  gap:4px;padding:4px 0;background:none;border:none;}
.page-title{font-size:20px;font-weight:700;color:var(--accent);text-align:center;margin:8px 0 16px;}

/* ── User bar ── */
.user-bar{display:flex;align-items:center;justify-content:space-between;
  background:var(--bg3);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;}
.user-bar-name{font-size:13px;color:var(--text2);}
.user-bar-role{font-size:11px;padding:2px 10px;border-radius:99px;font-weight:700;}
.role-admin{background:var(--purple);color:#fff;}
.role-member{background:var(--bg4);color:var(--text2);}
.logout-btn{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;}

/* ── Home ── */
#screen-home{padding-top:0;}
.home-hero{text-align:center;padding:36px 0 28px;}
.home-hero h1{font-size:42px;font-weight:800;letter-spacing:-1px;}
.home-hero h1 span{color:var(--accent);}
.home-hero .underline{width:80px;height:3px;background:var(--accent);margin:8px auto 0;border-radius:2px;}
.menu-btn{display:flex;align-items:center;justify-content:flex-start;gap:12px;width:100%;padding:20px;
  background:var(--bg3);border:none;border-radius:var(--radius);color:var(--text);font-size:18px;
  font-weight:600;cursor:pointer;margin-bottom:12px;transition:background .15s,transform .1s;}
.menu-btn:active{background:var(--bg4);transform:scale(0.98);}
.menu-btn .icon{font-size:22px;}

/* ── Dashboard btn (admin only) ── */
.dashboard-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;
  background:linear-gradient(135deg,var(--purple),#9333ea);border:none;border-radius:var(--radius);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;}

/* ── Cards ── */
.card{background:var(--bg3);border-radius:var(--radius);padding:18px;margin-bottom:12px;}

/* ── Progress ── */
.progress-big{text-align:center;}
.progress-num{font-size:52px;font-weight:800;line-height:1;}
.progress-num span{font-size:28px;font-weight:400;color:var(--text2);}
.progress-sub{color:var(--text2);font-size:14px;margin:6px 0 14px;}
.progress-bar-wrap{background:var(--bg4);border-radius:99px;height:12px;margin-bottom:6px;}
.progress-bar{background:var(--accent);height:12px;border-radius:99px;transition:width .4s;}
.progress-pct{text-align:center;color:var(--accent);font-size:13px;}

/* ── Member row ── */
.member-row{display:flex;align-items:center;justify-content:space-between;
  background:var(--bg3);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;}
.member-name{font-size:16px;font-weight:600;}
.member-part{font-size:13px;color:var(--text2);margin-top:2px;}

/* ── Toggle ── */
.toggle{width:52px;height:30px;border-radius:99px;background:var(--bg4);position:relative;
  cursor:pointer;transition:background .2s;flex-shrink:0;border:none;}
.toggle.on{background:var(--accent2);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:24px;height:24px;
  border-radius:50%;background:#fff;transition:left .2s;}
.toggle.on::after{left:25px;}
.toggle:disabled{opacity:.4;cursor:not-allowed;}

/* ── Tabs ── */
.tab-bar{display:flex;background:var(--bg3);border-radius:var(--radius);padding:4px;gap:4px;margin-bottom:16px;}
.tab-btn{flex:1;padding:9px 2px;border:none;border-radius:12px;background:transparent;
  color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:background .15s,color .15s;}
.tab-btn.active{background:var(--accent2);color:#fff;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── Buttons ── */
.save-month-btn{width:100%;padding:16px;background:var(--accent2);border:none;
  border-radius:var(--radius);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;}
.green-btn{width:100%;padding:18px;background:var(--green);border:none;border-radius:var(--radius);
  color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:12px;}
.blue-btn{width:100%;padding:18px;background:var(--bg3);border:none;border-radius:var(--radius);
  color:var(--text);font-size:17px;font-weight:600;cursor:pointer;margin-bottom:12px;}
.purple-btn{width:100%;padding:18px;background:var(--purple);border:none;border-radius:var(--radius);
  color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:12px;}
.submit-btn{width:100%;padding:16px;background:var(--accent2);border:none;border-radius:var(--radius);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;}
.upload-mini{background:none;border:1px solid var(--border);border-radius:6px;
  color:var(--text2);font-size:12px;padding:5px 10px;cursor:pointer;}

/* ── Forms ── */
.form-label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--bg4);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:16px;padding:14px;
  outline:none;margin-bottom:14px;}
.form-input:focus{border-color:var(--accent);}
textarea.form-input{resize:none;height:90px;}
select.form-input{-webkit-appearance:none;appearance:none;}

/* ── Upload box ── */
.upload-box{border:2px dashed var(--accent2);border-radius:var(--radius-sm);padding:28px 16px;
  text-align:center;cursor:pointer;position:relative;margin-bottom:14px;}
.upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-box .upload-icon{font-size:28px;margin-bottom:6px;}
.upload-box .upload-text{color:var(--accent);font-size:14px;}
.upload-done{color:var(--green);font-size:13px;margin-top:6px;}

/* ── Badges ── */
.badge{display:inline-block;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;}
.badge.pending{background:var(--amber);color:#000;}
.badge.approved{background:var(--green);color:#000;}
.badge.rejected{background:var(--red);color:#fff;}
.menu-badge{background:var(--red);color:#fff;font-size:12px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:auto;}

/* ── History rows ── */
.history-row{background:var(--bg4);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;flex-shrink:0;}
.history-top{display:flex;justify-content:space-between;align-items:flex-start;}
.history-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.history-amount{font-size:18px;font-weight:700;color:var(--accent);}
.history-sub{font-size:13px;color:var(--text2);margin:3px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.history-date{font-size:11px;color:var(--text3);margin-top:6px;}

/* ── Extra player cards ── */
.extra-card{background:var(--bg3);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;}
.extra-top{display:flex;align-items:flex-start;}

/* ── Calendar ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav{background:none;border:none;color:var(--accent);font-size:22px;cursor:pointer;padding:4px 10px;}
.cal-month{font-size:18px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:12px;color:var(--text3);padding:4px 0;}
.cal-day{text-align:center;padding:8px 2px;font-size:15px;border-radius:8px;cursor:pointer;}
.cal-day.today{background:var(--accent2);font-weight:800;}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
  display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 20px 48px;
  width:100%;max-width:430px;max-height:92vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.modal-close{float:right;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;margin-top:-4px;}

/* ── Toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--green);color:#fff;padding:12px 28px;border-radius:99px;
  font-size:14px;font-weight:700;z-index:400;opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;}
.toast.error{background:var(--red);}

/* ── Admin action row ── */
.admin-action-row{display:flex;gap:6px;margin-top:8px;}
.action-btn{flex:1;padding:8px 4px;border:none;border-radius:8px;font-size:12px;
  font-weight:700;cursor:pointer;}
.action-approve{background:var(--green);color:#000;}
.action-reject{background:var(--red);color:#fff;}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">読み込み中...</div>
</div>

<div id="auth-overlay" class="hidden">
  <div style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:998;" onclick="closeAdminLogin()"></div>
  <div class="auth-card" style="position:relative;z-index:999;">
    <button onclick="closeAdminLogin()" style="position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;">✕</button>
    <div class="auth-title" style="font-size:18px;">🔐 管理者ログイン</div>
    <div class="auth-sub">会計担当者専用</div>
    <div id="auth-login-panel">
      <label class="form-label">メールアドレス</label>
      <input class="form-input" id="login-email" type="email" placeholder="your@email.com">
      <label class="form-label">パスワード</label>
      <input class="form-input" id="login-pass" type="password" placeholder="パスワード">
      <button class="submit-btn" onclick="doLogin()">ログイン</button>
    </div>
  </div>
</div>

<div id="app">

  <div id="screen-home" class="screen">
    <div class="home-hero">
      <h1>Groovy <span>会計</span></h1>
      <div class="underline"></div>
    </div>
    
    <div id="home-alert-banner" style="display:none;background:var(--red);color:#fff;padding:14px;border-radius:var(--radius-sm);margin-bottom:16px;font-size:14px;font-weight:700;text-align:center;box-shadow:0 4px 12px rgba(224,82,82,0.3);">
      🚨 未承認の申請があります！
    </div>

    <div id="user-bar-home" class="user-bar">
      <div>
        <div class="user-bar-name" id="home-user-name">ゲスト</div>
        <div style="margin-top:3px;"><span class="user-bar-role" id="home-user-role">👁 閲覧モード</span></div>
      </div>
      <button id="admin-login-btn" onclick="openAdminLogin()" style="font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--accent2);color:var(--accent2);background:transparent;cursor:pointer;">🔐 管理者ログイン</button>
      <button id="logout-btn" class="logout-btn" onclick="doLogout()" style="display:none;">ログアウト</button>
    </div>

    <button class="menu-btn" onclick="go('buhi')">
      <span class="icon">💰</span> 部費集金
      <span id="badge-buhi" class="menu-badge" style="display:none;"></span>
    </button>
    <button class="menu-btn" onclick="go('event')"><span class="icon">🎉</span> 特別徴収（イベント費）</button>
    <button class="menu-btn" onclick="go('repair')">
      <span class="icon">🎺</span> 楽器修理
      <span id="badge-repair" class="menu-badge" style="display:none;"></span>
    </button>
    <button class="menu-btn" onclick="go('extra')"><span class="icon">🚗</span> エキストラ交通費</button>
    <button class="menu-btn" onclick="go('other')">
      <span class="icon">📝</span> その他出費
      <span id="badge-other" class="menu-badge" style="display:none;"></span>
    </button>
    
    <div id="admin-only-btns" style="display:none;">
      <button class="menu-btn" onclick="go('enjo')" style="background:linear-gradient(135deg,#1a3a5c,#243550);border:1px solid var(--accent2);"><span class="icon">🏛</span> 援助金管理</button>
      <button class="dashboard-btn" onclick="openDashboard()" style="margin-bottom:12px;">📊 サークル財政ダッシュボード</button>
    </div>
  </div>

  <div id="screen-buhi" class="screen">
    <div class="page-header">
      <button class="back-btn" onclick="go('home')">← ホームに戻る</button>
      <div class="page-title">部費集金</div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-btn-collect" onclick="switchBuhiTab('collect')">回収状況</button>
      <button class="tab-btn" id="tab-btn-member" onclick="switchBuhiTab('member')">メンバー追加</button>
      <button class="tab-btn" id="tab-btn-history" onclick="switchBuhiTab('history')">月別履歴</button>
    </div>
    <div class="tab-panel active" id="tab-collect">
      <div id="deadline-card" style="border-radius:var(--radius);padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--bg3);">
        <div style="display:flex;align-items:center;gap:10px;flex:1;">
          <span style="font-size:22px;">📅</span>
          <div>
            <div style="font-size:12px;color:var(--text3);margin-bottom:2px;">集金期日</div>
            <div id="deadline-display" style="font-size:17px;font-weight:700;color:var(--text2);">未設定</div>
            <div id="deadline-remaining" style="font-size:12px;margin-top:2px;color:var(--text3);">期日を設定してください</div>
          </div>
        </div>
        <button id="deadline-change-btn" onclick="openDeadlineEdit()" style="background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;padding:6px 12px;cursor:pointer;display:none;">変更</button>
      </div>
      <div class="card">
        <div class="progress-big">
          <div class="progress-num" id="buhi-num">0 <span>/ 0</span></div>
          <div class="progress-sub">人が支払い済み</div>
          <div class="progress-bar-wrap"><div class="progress-bar" id="buhi-bar" style="width:0%"></div></div>
          <div class="progress-pct" id="buhi-pct">0%</div>
        </div>
      </div>
      <div id="buhi-list"></div>
      <div id="buhi-admin-actions" style="display:none;">
        <button class="save-month-btn" onclick="saveMonthSnapshot()">今月の状況を保存する</button>
      </div>
    </div>
    <div class="tab-panel" id="tab-member">
      <div id="member-add-form" class="card" style="display:none;">
        <div style="font-size:16px;font-weight:700;margin-bottom:16px;">メンバーを追加</div>
        <label class="form-label">名前</label><input class="form-input" id="buhi-add-name" placeholder="例: 山田 太郎">
        <label class="form-label">パート</label>
        <select class="form-input" id="buhi-add-part">
          <option value="サックス">サックス</option><option value="トロンボーン">トロンボーン</option><option value="トランペット">トランペット</option><option value="リズム">リズム</option>
        </select>
        <button class="submit-btn" onclick="addBuhiMember()">追加する</button>
      </div>
      <div id="member-readonly-notice" class="card" style="display:none;">
        <div style="font-size:14px;color:var(--text2);">📋 メンバーの追加は管理者のみ可能です。</div>
      </div>
      <div id="buhi-member-list"></div>
    </div>
    <div class="tab-panel" id="tab-history"><div id="buhi-history-list"></div></div>
  </div>

  <div id="screen-extra" class="screen">
    <div class="page-header">
      <button class="back-btn" onclick="go('home')">← ホームに戻る</button>
      <div class="page-title">エキストラ交通費</div>
    </div>
    <div style="background:var(--bg3);border-radius:var(--radius);padding:18px;text-align:center;margin-bottom:14px;">
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px;">今月の合計交通費</div>
      <div style="font-size:40px;font-weight:800;color:var(--accent);" id="extra-monthly-total">¥0</div>
    </div>
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" onclick="calMove(-1)">←</button>
        <div class="cal-month" id="cal-month-label"></div>
        <button class="cal-nav" onclick="calMove(1)">→</button>
      </div>
      <div class="cal-grid">
        <div class="cal-dow">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div><div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div><div class="cal-dow">土</div>
      </div>
      <div class="cal-grid" id="cal-body"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:10px;margin-bottom:10px;">
      <div style="font-size:16px;font-weight:700;">エキストラプレーヤー</div>
      <button onclick="openAddPlayer()" style="color:var(--accent);background:none;border:none;font-weight:700;cursor:pointer;">＋ 追加</button>
    </div>
    <div id="extra-player-list"></div>
  </div>

  <div id="screen-other" class="screen">
    <div class="page-header">
      <button class="back-btn" onclick="go('home')">← ホームに戻る</button>
      <div class="page-title">その他出費</div>
    </div>
    <div class="card">
      <div style="font-size:17px;font-weight:700;margin-bottom:16px;">📝 出費を申請する</div>
      <label class="form-label">名前</label><input class="form-input" id="other-name" placeholder="例: 山田太郎">
      <label class="form-label">内容</label><textarea class="form-input" id="other-content" placeholder="例: 譜面購入、スタジオレンタル など"></textarea>
      <label class="form-label">金額（円）</label><input class="form-input" id="other-amount" type="number" placeholder="例: 5000">
      <button class="submit-btn" id="other-submit-btn" onclick="submitOther()">申請する</button>
    </div>
    <div class="card" style="margin-top:4px;padding:12px 16px;">
      <div style="font-size:15px;font-weight:700;">申請履歴</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin:12px 0 16px;">
        <button onclick="otherHistMove(-1)" style="background:var(--bg4);border:none;color:var(--text);font-size:16px;border-radius:50%;width:32px;height:32px;cursor:pointer;">←</button>
        <div id="other-month-label" style="font-size:16px;font-weight:700;color:var(--accent);"></div>
        <button onclick="otherHistMove(1)" style="background:var(--bg4);border:none;color:var(--text);font-size:16px;border-radius:50%;width:32px;height:32px;cursor:pointer;">→</button>
      </div>
      <div id="other-history-list" style="max-height:350px;overflow-y:auto;padding-right:4px;"></div>

<script>
// ══════════════════════════════════════════════════════
// SUPABASE & LINE CONFIG
// ══════════════════════════════════════════════════════
const SUPABASE_URL = 'https://ndxbssyqahlxmxwhypwz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5keGJzc3lxYWhseG14d2h5cHd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Nzk0OTYsImV4cCI6MjA5MjU1NTQ5Nn0.ka1W5x0lNnpfhfFDpsYE3BdTyTOwU13XRaBgw1jn5ok';

// ══════════════════════════════════════════════════════
// 🚨 LINE通知（GAS経由）復活！
// ══════════════════════════════════════════════════════
async function sendLineNotify(message) {
  try {
    // 👇ここにさっきスマホで成功した【GASのURL】を貼り直してください！！
    const gasUrl = 'https://script.google.com/macros/s/ここのURLをさっき成功したものに書き換えてください/exec';
    
    await fetch(gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'message=' + encodeURIComponent(message)
    });
    console.log('LINE送信成功');
  } catch(e) {
    console.warn('LINE送信エラー:', e);
  }
}

// ══════════════════════════════════════════════════════
// HTTP HELPERS & AUTH
// ══════════════════════════════════════════════════════
let currentUser = null; let currentProfile = null; let accessToken = null;
function isAdmin() { return currentProfile?.role === 'admin'; }

function getHeaders(token) {
  return { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + (token||SUPABASE_KEY), 'Prefer': 'return=representation' };
}
async function dbGet(table, params='', token) { const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers: getHeaders(token) }); return r.json(); }
async function dbInsert(table, data, token) { const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, { method:'POST', headers: getHeaders(token), body: JSON.stringify(data) }); return r.json(); }
async function dbUpdate(table, data, params, token) { const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { method:'PATCH', headers: getHeaders(token), body: JSON.stringify(data) }); return r.json(); }
async function dbDelete(table, params, token) { await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { method:'DELETE', headers: getHeaders(token) }); }

function openAdminLogin() { document.getElementById('auth-overlay').classList.remove('hidden'); }
function closeAdminLogin() { document.getElementById('auth-overlay').classList.add('hidden'); }
async function doLogin() {
  const email = document.getElementById('login-email').value.trim(); const pass = document.getElementById('login-pass').value;
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, { method:'POST', headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY}, body: JSON.stringify({email, password: pass}) });
    const data = await r.json(); if (!r.ok) throw new Error(data.error_description);
    accessToken = data.access_token; currentUser = data.user; localStorage.setItem('sb_token', accessToken);
    currentProfile = { role: 'admin', name: currentUser.email };
    closeAdminLogin(); await init();
  } catch(e) { showToast(e.message, true); }
}
async function doLogout() { localStorage.removeItem('sb_token'); currentUser=null; currentProfile=null; accessToken=null; await init(); }

// ══════════════════════════════════════════════════════
// STATE & INIT
// ══════════════════════════════════════════════════════
let buhi = []; let repairHistory = []; let extraPlayers = []; let otherHistory = [];
const NOW_YEAR = new Date().getFullYear(); const NOW_MONTH = new Date().getMonth();

function go(id) {
  document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
  const el = document.getElementById('screen-' + id); if (el) { el.style.display = 'block'; el.classList.add('active'); el.scrollTop=0; }
  if (id === 'home') renderHome();
  if (id === 'buhi') switchBuhiTab('collect');
  if (id === 'extra') { renderCalendar(); renderExtraPlayers(); }
  if (id === 'repair') { document.getElementById('repair-admin-btn').style.display = isAdmin()?'block':'none'; }
  if (id === 'repair-admin') renderRepairAdmin();
  if (id === 'other') renderOtherHistory();
}

async function init() {
  document.getElementById('loading-overlay').classList.remove('hidden');
  try { buhi = await dbGet('members','order=id.asc', accessToken); } catch(e){}
  try { repairHistory = await dbGet('repair_requests','order=created_at.desc', accessToken); } catch(e){}
  try { extraPlayers = await dbGet('extra_players','order=created_at.asc', accessToken); } catch(e){}
  try { otherHistory = await dbGet('other_expenses','order=created_at.desc', accessToken); } catch(e){}
  
  // 部費の支払い状態マッピング（仮実装）
  try { const payments = await dbGet('buhi_payments',`year=eq.${NOW_YEAR}&month=eq.${NOW_MONTH}`, accessToken);
    buhi.forEach(m => { const p = payments.find(x=>x.member_id===m.id); m.paid = p?p.paid:false; m.payRowId = p?p.id:null; });
  } catch(e){}

  document.getElementById('loading-overlay').classList.add('hidden');
  renderHome(); go('home');
}

// ══════════════════════════════════════════════════════
// バッジ＆バナー更新機能（追加）
// ══════════════════════════════════════════════════════
function updateBadges() {
  const pendingRepair = repairHistory.filter(r => r.status === 'pending').length;
  const pendingOther = otherHistory.filter(h => h.status === 'pending').length;
  
  const bRepair = document.getElementById('badge-repair');
  bRepair.textContent = pendingRepair > 0 ? '未承認 '+pendingRepair : '';
  bRepair.style.display = pendingRepair > 0 ? 'inline-block' : 'none';

  const bOther = document.getElementById('badge-other');
  bOther.textContent = pendingOther > 0 ? '未承認 '+pendingOther : '';
  bOther.style.display = pendingOther > 0 ? 'inline-block' : 'none';

  let unpaidBuhi = 0;
  if(isAdmin()) unpaidBuhi = buhi.filter(m => !m.paid).length;
  const bBuhi = document.getElementById('badge-buhi');
  bBuhi.textContent = unpaidBuhi > 0 ? '未払 '+unpaidBuhi : '';
  bBuhi.style.display = (isAdmin() && unpaidBuhi > 0) ? 'inline-block' : 'none';

  const banner = document.getElementById('home-alert-banner');
  let texts = [];
  if(pendingRepair>0) texts.push(`修理 ${pendingRepair}件`);
  if(pendingOther>0) texts.push(`出費 ${pendingOther}件`);
  if(isAdmin() && unpaidBuhi>0) texts.push(`部費未払 ${unpaidBuhi}人`);

  if(isAdmin() && texts.length > 0) {
    banner.style.display = 'block';
    banner.textContent = '🚨 処理待ちがあります: ' + texts.join(' / ');
  } else {
    banner.style.display = 'none';
  }
}

function renderHome() {
  const admin = isAdmin();
  document.getElementById('home-user-name').textContent = admin ? '管理者' : 'ゲスト';
  document.getElementById('home-user-role').textContent = admin ? '👑 管理者モード' : '👁 閲覧モード';
  document.getElementById('home-user-role').className = admin ? 'user-bar-role role-admin' : 'user-bar-role role-member';
  document.getElementById('admin-only-btns').style.display = admin ? 'block' : 'none';
  document.getElementById('admin-login-btn').style.display = admin ? 'none' : 'inline-block';
  document.getElementById('logout-btn').style.display = admin ? 'inline-block' : 'none';
  updateBadges();
}

// ══════════════════════════════════════════════════════
// 部費（ゲスト表示の制限 追加）
// ══════════════════════════════════════════════════════
function switchBuhiTab(t) { 
  document.querySelectorAll('#screen-buhi .tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='collect') renderBuhi(); 
}

function renderBuhi() {
  const paid = buhi.filter(m=>m.paid).length; const total = buhi.length;
  const pct = total ? Math.round(paid/total*100) : 0;
  document.getElementById('buhi-num').innerHTML = paid+' <span>/ '+total+'</span>';
  document.getElementById('buhi-bar').style.width = pct+'%';
  document.getElementById('buhi-pct').textContent = pct+'%';

  const list = document.getElementById('buhi-list');
  if (!isAdmin()) {
    // ゲストには名前を隠してサマリーだけ表示
    list.innerHTML = `
      <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:24px;text-align:center;margin-top:16px;">
        <div style="font-size:14px;color:var(--text2);margin-bottom:8px;">現在の支払い率</div>
        <div style="font-size:36px;font-weight:900;color:var(--accent);">${pct}%</div>
        <div style="font-size:12px;color:var(--text3);margin-top:12px;">※個人の支払い状況は管理者のみ閲覧可能です</div>
      </div>`;
    document.getElementById('buhi-admin-actions').style.display = 'none';
  } else {
    // 管理者には全員のリストを表示
    list.innerHTML = buhi.map((m,i) => `
      <div class="member-row">
        <div><div class="member-name">${m.name}</div><div class="member-part">${m.part}</div></div>
        <button class="toggle ${m.paid?'on':''}" onclick="toggleBuhi(${i})"></button>
      </div>`).join('');
    document.getElementById('buhi-admin-actions').style.display = 'block';
  }
  updateBadges();
}
async function toggleBuhi(i) {
  if(!isAdmin()) return;
  const m = buhi[i]; m.paid = !m.paid; renderBuhi();
  try {
    if (m.payRowId) await dbUpdate('buhi_payments',{paid:m.paid},`id=eq.${m.payRowId}`, accessToken);
    else { const r = await dbInsert('buhi_payments',{member_id:m.id,year:NOW_YEAR,month:NOW_MONTH,paid:m.paid}, accessToken); if(r&&r[0]) m.payRowId=r[0].id; }
  } catch(e){}
}

// ══════════════════════════════════════════════════════
// 楽器修理
// ══════════════════════════════════════════════════════
async function submitRepair() {
  const name=document.getElementById('repair-name').value.trim(); const amount=parseInt(document.getElementById('repair-amount').value)||0;
  if (!name||!amount) return;
  try {
    const rows=await dbInsert('repair_requests',{name,amount,status:'pending',date:new Date().toISOString().slice(0,10)}, accessToken);
    if (rows&&rows[0]) repairHistory.unshift(rows[0]);
    await sendLineNotify(`🎺【修理申請】${name} / ¥${amount}`);
    showToast('申請完了'); go('home');
  } catch(e){}
}
function renderRepairAdmin() {
  document.getElementById('repair-history-list').innerHTML=repairHistory.map(r=>`
    <div class="history-row">
      <div class="history-top">
        <div class="history-name">${r.name}</div>
        <div style="text-align:right;">
          <div class="history-amount">¥${r.amount.toLocaleString()}</div>
          <span class="badge ${r.status==='pending'?'pending':r.status==='approved'?'approved':'rejected'}">${r.status==='pending'?'保留':r.status==='approved'?'承認':'却下'}</span>
        </div>
      </div>
      ${isAdmin()&&r.status==='pending'?`<div class="admin-action-row"><button class="action-btn action-approve" onclick="reviewRepair(${r.id},'approved')">承認</button><button class="action-btn action-reject" onclick="reviewRepair(${r.id},'rejected')">却下</button></div>`:''}
    </div>`).join('');
    updateBadges();
}
async function reviewRepair(id, status) {
  try { await dbUpdate('repair_requests',{status},`id=eq.${id}`, accessToken); repairHistory.find(r=>r.id===id).status=status; renderRepairAdmin(); } catch(e){}
}

// ══════════════════════════════════════════════════════
// エキストラ交通費（総合計を一番目立たせる追加）
// ══════════════════════════════════════════════════════
let calYear = NOW_YEAR; let calMonth = NOW_MONTH;
function calMove(dir) { calMonth+=dir; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }
function renderCalendar() {
  const m=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-month-label').textContent=calYear+'年'+m[calMonth];
  const d=new Date(calYear,calMonth+1,0).getDate(); const f=new Date(calYear,calMonth,1).getDay();
  let h=''; for(let i=0;i<f;i++) h+='<div></div>'; for(let i=1;i<=d;i++) h+=`<div class="cal-day">${i}</div>`;
  document.getElementById('cal-body').innerHTML=h;
}
function renderExtraPlayers() {
  let totalAll = 0;
  document.getElementById('extra-player-list').innerHTML=extraPlayers.map(p=> {
    // 総合計の計算
    const grandTotal = p.fee * p.visits * 2 + (p.manual_fee || 0);
    totalAll += grandTotal;
    
    return `
    <div class="extra-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
        <div>
          <div style="font-size:18px;font-weight:800;">${p.name}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px;">${p.part || '未設定'}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:var(--text2);margin-bottom:2px;">今月の総合計</div>
          <div style="font-size:28px;font-weight:900;color:var(--accent);line-height:1;">¥${grandTotal.toLocaleString()}</div>
        </div>
      </div>
      
      <div style="background:var(--bg4);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:12px;color:var(--text2);">
          片道 ¥${p.fee.toLocaleString()} × ${p.visits}回往復<br>
          ${p.manual_fee ? '<span style="color:var(--accent);">＋手動加算 ¥'+p.manual_fee.toLocaleString()+'</span>' : ''}
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <button onclick="updateVisit(${p.id}, -1)" style="width:36px;height:36px;border-radius:50%;border:none;background:var(--bg3);color:#fff;font-size:20px;font-weight:700;">－</button>
          <div style="font-size:22px;font-weight:800;min-width:30px;text-align:center;">${p.visits}</div>
          <button onclick="updateVisit(${p.id}, 1)" style="width:36px;height:36px;border-radius:50%;border:none;background:var(--accent2);color:#fff;font-size:20px;font-weight:700;">＋</button>
        </div>
      </div>
      
      ${isAdmin() ? `
      <div style="margin-top:8px;display:flex;gap:8px;">
        <input class="form-input" style="flex:1;margin:0;padding:8px;" type="number" value="${p.manual_fee||0}" placeholder="手動加算" onchange="updFee(${p.id},this.value)">
        <button style="background:none;border:1px solid var(--red);color:var(--red);border-radius:6px;padding:0 12px;font-size:12px;" onclick="delExtra(${p.id})">削除</button>
      </div>` : ''}
    </div>`;
  }).join('');
  document.getElementById('extra-monthly-total').textContent = '¥' + totalAll.toLocaleString();
}
async function updateVisit(id, dir) {
  const p = extraPlayers.find(x=>x.id===id); if(!p) return;
  p.visits += dir; if(p.visits<0) p.visits=0; renderExtraPlayers();
  try { await dbUpdate('extra_players',{visits:p.visits},`id=eq.${id}`, accessToken); } catch(e){}
}
async function updFee(id, val) {
  const p=extraPlayers.find(x=>x.id===id); p.manual_fee=parseInt(val)||0; renderExtraPlayers();
  try { await dbUpdate('extra_players',{manual_fee:p.manual_fee},`id=eq.${id}`, accessToken); } catch(e){}
}
function openAddPlayer(){ document.getElementById('add-player-modal').classList.add('open'); }
function closeAddPlayer(){ document.getElementById('add-player-modal').classList.remove('open'); }
async function addPlayer(){
  const name=document.getElementById('ap-name').value; const fee=parseInt(document.getElementById('ap-fee').value)||0;
  if(!name) return;
  try {
    const r=await dbInsert('extra_players',{name,fee,visits:0}, accessToken); if(r&&r[0]) extraPlayers.push(r[0]);
    closeAddPlayer(); renderExtraPlayers(); showToast('追加完了');
  } catch(e){}
}
async function delExtra(id){ try{await dbDelete('extra_players',`id=eq.${id}`,accessToken); extraPlayers=extraPlayers.filter(x=>x.id!==id); renderExtraPlayers();}catch(e){} }


// ══════════════════════════════════════════════════════
// その他出費（月別＆スクロール対応 追加）
// ══════════════════════════════════════════════════════
let otherViewYear = NOW_YEAR;
let otherViewMonth = NOW_MONTH;

function otherHistMove(dir) {
  otherViewMonth += dir;
  if (otherViewMonth < 0) { otherViewMonth = 11; otherViewYear--; }
  if (otherViewMonth > 11) { otherViewMonth = 0; otherViewYear++; }
  renderOtherHistory();
}

function renderOtherHistory() {
  const labels = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('other-month-label').textContent = otherViewYear + '年' + labels[otherViewMonth];

  // 選択中の月で絞り込み
  const monthStr = otherViewYear + '-' + String(otherViewMonth+1).padStart(2,'0');
  const filtered = otherHistory.filter(h => (h.date||'').startsWith(monthStr));

  const list = document.getElementById('other-history-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:30px 0;color:var(--text3);font-size:14px;">この月の申請はありません</div>';
    document.getElementById('other-total').textContent = '¥0';
    updateBadges();
    return;
  }

  // スクロールしても潰れないように flex-shrink: 0 を付与したHTML
  list.innerHTML = filtered.map(h => `
    <div class="history-row">
      <div class="history-top">
        <div style="flex:1;min-width:0;padding-right:8px;">
          <div class="history-name">${h.name}</div>
          <div class="history-sub">${h.content}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div class="history-amount">¥${h.amount.toLocaleString()}</div>
          <div style="margin-top:4px;"><span class="badge ${h.status==='pending'?'pending':h.status==='approved'?'approved':'rejected'}">${h.status==='pending'?'保留中':h.status==='approved'?'承認済み':'却下'}</span></div>
        </div>
      </div>
      <div class="history-date">申請日: ${h.date||''}</div>
      ${isAdmin()&&h.status==='pending'?`
        <div class="admin-action-row">
          <button class="action-btn action-approve" onclick="reviewOther(${h.id},'approved')">✓ 承認</button>
          <button class="action-btn action-reject" onclick="reviewOther(${h.id},'rejected')">✗ 却下</button>
        </div>`:''}
    </div>`).join('');

  document.getElementById('other-total').textContent = '¥' + filtered.reduce((s,h)=>s+h.amount,0).toLocaleString();
  updateBadges();
}

async function submitOther() {
  const name=document.getElementById('other-name').value.trim(); const content=document.getElementById('other-content').value.trim(); const amount=parseInt(document.getElementById('other-amount').value)||0;
  if (!name||!amount) return;
  try {
    const rows=await dbInsert('other_expenses',{name,content,amount,status:'pending',date:new Date().toISOString().slice(0,10)}, accessToken);
    if (rows&&rows[0]) otherHistory.unshift(rows[0]);
    await sendLineNotify(`📝【出費申請】${name} / ¥${amount}`);
    document.getElementById('other-name').value=''; document.getElementById('other-amount').value=''; document.getElementById('other-content').value='';
    showToast('申請完了'); renderOtherHistory();
  } catch(e){}
}
async function reviewOther(id, status) {
  try { await dbUpdate('other_expenses',{status},`id=eq.${id}`, accessToken); otherHistory.find(r=>r.id===id).status=status; renderOtherHistory(); } catch(e){}
}

// UTILS
// ══════════════════════════════════════════════════════
let confirmCallback=null;
function showConfirm(msg,cb) { document.getElementById('confirm-msg').textContent=msg; confirmCallback=cb; document.getElementById('confirm-dialog').classList.add('open'); document.getElementById('confirm-ok-btn').onclick=()=>{ closeConfirm(); if(confirmCallback) confirmCallback(); }; }
function closeConfirm() { document.getElementById('confirm-dialog').classList.remove('open'); confirmCallback=null; }
let toastTimer; function showToast(msg, err=false) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.toggle('error',err); t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2500); }

// Boot
(async()=>{ await init(); })();
</script>
